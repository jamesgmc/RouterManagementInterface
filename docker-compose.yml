services:
  router-management-ui:
    build:
      context: .
      dockerfile: RouterManagement/Dockerfile
    image: routermanagementblazor
    container_name: routermanagement-app
    ports:
      - "8080:8080"
    environment:
      # Use host.containers.internal to allow the container to reach the host's localhost (Podman)
      # For Docker Desktop on Windows/Mac, use host.docker.internal
      - ApiBaseUrl=http://localhost:3020
    restart: unless-stopped